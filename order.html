    <main class="wrapper">
      <article class="order">
        <p>大切な方への贈り物や、特別な記念日に。</p>
        <p>
          ご希望のイメージやお好みをお伺いし、世界にひとつだけのテディベアをお作りいたします。
        </p>
        <p>サイズやカラー、衣装などもご相談いただけます。</p>
        <p>
          一体一体手作業で制作するため、お届けまでお時間をいただきますが、その分心を込めて制作いたします。
        </p>

        <section id="contact" class="wrapper">
          <h2 class="sec-title">お申し込みフォーム</h2>

          <form action="#" method="post">
            <dl>
              <dt><label for="name">お名前</label></dt>
              <dd><input type="text" id="name" /></dd>
              <dt><label for="email">メールアドレス</label></dt>
              <dd><input type="email" id="email" /></dd>
              <dt><label for="tel">お電話番号</label></dt>
              <dd><input type="tel" id="tel" /></dd>
              <dt><label for="contact">お問い合わせ</label></dt>
              <dd>
                <textarea
                  id="content"
                  cols="30"
                  rows="10"
                  placeholder="ご希望のサイズ、カラー、ご予算などをお聞かせください"
                ></textarea>
              </dd>
            </dl>
            <div class="button"><input type="submit" value="送信する" /></div>
          </form>
        </section>
      </article>
